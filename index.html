<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quem aspira?</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-512.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Quem aspira?" />
  <meta name="theme-color" content="#FF8A3D" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #4A2E14;
      --ink-soft: #9C7350;
      --surface: #FFFCF5;
      --surface-glass: rgba(255,252,245,0.78);
      --border: rgba(74,46,20,0.1);
      --radius-lg: 20px;
      --radius-xl: 28px;
      --joao: #2F80ED;
      --joao-soft: #DCEBFF;
      --joao-deep: #0C447C;
      --rafael: #1FAF7F;
      --rafael-soft: #DAF6EB;
      --rafael-deep: #176B4E;
      --gold: #FF8A3D;
      --gold-soft: #FFE9D2;
      --gold-deep: #9A4B00;
    }
    html, body { font-family: "Nunito", -apple-system, sans-serif; }
    body {
      background: linear-gradient(160deg, #FFE066 0%, #FFAB3D 45%, #FF7A5C 100%);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }
    .bg-blob {
      position: fixed; border-radius: 50%; filter: blur(50px);
      opacity: 0.55; pointer-events: none; z-index: 0;
    }
    .blob1 { width: 280px; height: 280px; top: -80px; left: -90px; background: #FFF1A8; animation: floatA 16s ease-in-out infinite; }
    .blob2 { width: 240px; height: 240px; bottom: -60px; right: -80px; background: #3EC9C2; opacity: 0.4; animation: floatB 19s ease-in-out infinite; }
    .blob3 { width: 200px; height: 200px; top: 38%; right: -90px; background: #FF4D4D; opacity: 0.32; animation: floatC 13s ease-in-out infinite; }
    @keyframes floatA { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(30px,40px) scale(1.12); } }
    @keyframes floatB { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-25px,-30px) scale(1.08); } }
    @keyframes floatC { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-20px,25px) scale(0.92); } }

    .app {
      width: 100%; max-width: 430px; min-height: 100dvh;
      display: flex; flex-direction: column;
      position: relative; z-index: 1;
    }
    .header { padding: 22px 16px 0; }
    .header-card {
      background: rgba(255,255,255,0.16);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: var(--radius-xl);
      padding: 18px 20px;
      text-align: center;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .header-card h1 {
      font-family: "Fredoka", sans-serif; font-size: 22px; font-weight: 600;
      color: #fff; letter-spacing: -0.01em;
    }
    .header-emoji { font-size: 26px; display: inline-block; animation: headerWiggle 2.6s ease-in-out infinite; }
    @keyframes headerWiggle { 0%,100% { transform: rotate(0deg); } 25% { transform: rotate(-14deg); } 75% { transform: rotate(14deg); } }

    .tabs {
      display: flex; gap: 4px; margin: 16px 16px 0; padding: 4px;
      background: rgba(255,255,255,0.18); border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.3);
    }
    .tab {
      flex: 1; padding: 9px 0; font-size: 13.5px; font-weight: 700;
      background: none; border: none; border-radius: 999px;
      color: rgba(255,255,255,0.85); cursor: pointer; transition: all 0.2s;
      font-family: "Nunito", sans-serif;
    }
    .tab.active { color: var(--ink); background: var(--surface); box-shadow: 0 3px 10px rgba(0,0,0,0.12); }
    .content { padding: 18px 16px 4px; }
    .panel { display: none; } .panel.active { display: block; }
    .card {
      background: var(--surface); border-radius: var(--radius-xl);
      padding: 26px 22px; text-align: center; margin-bottom: 12px;
      box-shadow: 0 10px 30px rgba(43,39,80,0.16);
    }
    .turn-label {
      font-size: 12px; color: var(--ink-soft); font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 14px;
    }

    /* MASCOT */
    .mascot { position: relative; margin: 0 auto 14px; animation: mascotFloat 3.2s ease-in-out infinite; }
    .mascot--lg { width: 108px; height: 108px; }
    .mascot--xl { width: 112px; height: 112px; }
    @keyframes mascotFloat { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-6px) rotate(-2deg); } }
    .mascot-face {
      width: 100%; height: 100%; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      position: relative; box-shadow: inset 0 -10px 18px rgba(0,0,0,0.08), 0 8px 0 rgba(0,0,0,0.06);
    }
    .mascot-joao .mascot-face { background: radial-gradient(circle at 32% 28%, #EAF4FF, var(--joao-soft) 60%, #BFD9FB 100%); }
    .mascot-rafael .mascot-face { background: radial-gradient(circle at 32% 28%, #E6FBF1, var(--rafael-soft) 60%, #B6EFD4 100%); }
    .mascot-joao::before {
      content: ''; position: absolute; top: -8px; left: 50%; width: 10px; height: 18px;
      background: var(--joao); border-radius: 6px; transform: translateX(-50%) rotate(-6deg);
    }
    .mascot-rafael::before {
      content: ''; position: absolute; top: -10px; left: 56%; width: 8px; height: 22px;
      background: var(--rafael); border-radius: 6px 6px 6px 0; transform: rotate(18deg);
    }
    .mascot-eyes { display: flex; gap: 18px; position: absolute; top: 38%; left: 50%; transform: translate(-50%,-50%); }
    .mascot--sm .mascot-eyes, .mascot--md .mascot-eyes { gap: 10px; }
    .eye { width: 9px; height: 9px; border-radius: 50%; background: var(--ink); animation: blink 4.4s ease-in-out infinite; }
    .mascot--sm .eye, .mascot--md .eye { width: 5px; height: 5px; }
    .eye:nth-child(2) { animation-delay: 0.06s; }
    @keyframes blink { 0%,90%,100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
    .mascot-mouth {
      position: absolute; top: 58%; left: 50%; transform: translateX(-50%);
      width: 18px; height: 6px; border-radius: 0 0 14px 14px; background: var(--ink); opacity: 0.85;
    }
    .mood-happy .mascot-eyes { top: 40%; }
    .mood-happy .eye { width: 9px; height: 5px; border-radius: 5px 5px 0 0; animation: none; }
    .mood-happy .mascot-mouth { width: 30px; height: 16px; border-radius: 0 0 30px 30px; top: 56%; }
    .mascot-blush { position: absolute; top: 56%; width: 14px; height: 9px; border-radius: 50%; background: rgba(255,111,160,0.55); opacity: 0; }
    .mood-happy .mascot-blush { opacity: 1; }
    .blush-l { left: 6%; } .blush-r { right: 6%; }
    .mascot-sparkle {
      position: absolute; font-size: 16px; opacity: 0; pointer-events: none;
    }
    .mood-happy .mascot-sparkle { opacity: 1; animation: sparkleTwinkle 1.4s ease-in-out infinite; }
    .sparkle-1 { top: -10px; right: -6px; animation-delay: 0s !important; }
    .sparkle-2 { bottom: 2px; left: -12px; font-size: 12px; animation-delay: 0.5s !important; }
    @keyframes sparkleTwinkle { 0%,100% { transform: scale(0.7) rotate(0deg); opacity: 0.4; } 50% { transform: scale(1.15) rotate(15deg); opacity: 1; } }

    .mystery-mascot {
      width: 92px; height: 92px; border-radius: 50%; margin: 0 auto;
      background: radial-gradient(circle at 32% 28%, #F1EEFB, #D8D2F2 70%, #BBB2E8 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: "Fredoka", sans-serif; font-size: 38px; font-weight: 600; color: var(--ink-soft);
      animation: mysteryShake 0.5s ease-in-out infinite;
      box-shadow: 0 8px 0 rgba(0,0,0,0.06);
    }
    @keyframes mysteryShake { 0%,100% { transform: rotate(-6deg); } 50% { transform: rotate(6deg); } }

    .person-name { font-family: "Fredoka", sans-serif; font-size: 27px; font-weight: 600; color: var(--ink); margin-bottom: 12px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 700;
      animation: badgeWiggle 2.8s ease-in-out infinite;
    }
    .badge-pending { background: var(--gold-soft); color: var(--gold-deep); border: 1.5px dashed var(--gold); }
    @keyframes badgeWiggle { 0%,80%,100% { transform: rotate(0deg); } 84% { transform: rotate(-3deg); } 88% { transform: rotate(3deg); } 92% { transform: rotate(-2deg); } }

    .btn-primary {
      width: 100%; padding: 15px; border-radius: 999px; border: none;
      background: linear-gradient(135deg, #FF8A3D, #FF5E62);
      color: #fff; font-size: 16px; font-weight: 700;
      font-family: "Nunito", sans-serif;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 8px; transition: transform 0.15s ease, box-shadow 0.15s; margin-bottom: 12px;
      box-shadow: 0 8px 20px rgba(255,122,62,0.45);
    }
    .btn-primary:active { transform: scale(0.95); box-shadow: 0 4px 10px rgba(255,122,62,0.4); }
    .btn-primary:disabled { opacity: 0.4; cursor: default; transform: none; }
    .next-info {
      background: var(--surface-glass); backdrop-filter: blur(6px);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border); padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .next-info-left { font-size: 13px; color: var(--ink-soft); font-weight: 700; }
    .next-info-right { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 800; color: var(--ink); }
    .avatar-sm {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; flex-shrink: 0;
      font-family: "Fredoka", sans-serif;
    }

    .done-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, var(--rafael-soft), #fff);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px; font-size: 28px; color: var(--rafael-deep);
      animation: doneBounce 0.7s cubic-bezier(.36,1.7,.4,1);
      position: relative; box-shadow: 0 6px 0 rgba(0,0,0,0.05);
    }
    @keyframes doneBounce {
      0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
      55%  { transform: scale(1.25) rotate(8deg); opacity: 1; }
      75%  { transform: scale(0.9) rotate(-4deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    .confetti-piece {
      position: absolute; top: 50%; left: 50%; width: 7px; height: 11px;
      border-radius: 2px; opacity: 0; pointer-events: none;
      animation: confettiBurst 1s ease-out forwards;
    }
    @keyframes confettiBurst {
      0%   { opacity: 1; transform: translate(-50%, -50%) rotate(0deg) translateY(0); }
      100% { opacity: 0; transform: translate(-50%, -50%) rotate(var(--rot)) translate(var(--dx), var(--dy)); }
    }
    .done-title { font-family: "Fredoka", sans-serif; font-size: 21px; font-weight: 600; margin-bottom: 6px; color: var(--ink); }
    .done-sub { font-size: 14px; color: var(--ink-soft); font-weight: 600; }
    .random-sub { font-size: 13.5px; color: var(--ink-soft); margin-bottom: 26px; font-weight: 600; }
    .countdown-area {
      min-height: 140px; display: flex; align-items: center;
      justify-content: center; margin-bottom: 26px;
    }
    .countdown-hint { font-size: 14px; color: var(--ink-soft); font-weight: 600; }
    .countdown-stack { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .countdown-num {
      font-family: "Fredoka", sans-serif;
      font-size: 78px; font-weight: 700; color: var(--ink); line-height: 1;
      animation: countdownPop 0.7s cubic-bezier(.36,1.6,.4,1);
      display: inline-block;
      background: linear-gradient(135deg, #FF8A3D, #FF4D4D);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    @keyframes countdownPop {
      0%   { transform: scale(0.3) rotate(-8deg); opacity: 0; }
      55%  { transform: scale(1.25) rotate(4deg); opacity: 1; }
      75%  { transform: scale(0.92) rotate(-2deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    .reveal-name { font-family: "Fredoka", sans-serif; font-size: 32px; font-weight: 600; animation: revealPop 0.5s ease; margin-top: 4px; }
    .reveal-name.joao { color: var(--joao-deep); }
    .reveal-name.rafael { color: var(--rafael-deep); }
    @keyframes revealPop { 0% { transform: scale(1.4); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    /* HISTORY */
    .history-section { padding: 6px 16px 32px; }
    .history-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding: 0 4px; }
    .history-head h2 { font-size: 12.5px; font-weight: 800; color: rgba(255,255,255,0.9); letter-spacing: 0.05em; text-transform: uppercase; }
    .reset-link { background: none; border: none; font-size: 13px; font-weight: 700; color: #fff; opacity: 0.85; cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 4px; }
    .reset-link:active { opacity: 0.5; }
    .history-list { background: var(--surface); border-radius: var(--radius-lg); overflow: hidden; box-shadow: 0 8px 24px rgba(43,39,80,0.14); }
    .history-item { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-bottom: 1px solid var(--border); }
    .history-item:last-child { border-bottom: none; }
    .history-info { flex: 1; min-width: 0; }
    .history-name { font-size: 14px; font-weight: 800; color: var(--ink); }
    .history-date { font-size: 12px; color: var(--ink-soft); margin-top: 1px; font-weight: 600; }
    .history-check { color: var(--rafael-deep); font-size: 16px; flex-shrink: 0; }
    .history-empty { padding: 28px 16px; text-align: center; font-size: 13px; color: var(--ink-soft); font-weight: 600; }
  </style>
</head>
<body>
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>
<div class="app">
  <div class="header">
    <div class="header-card"><span class="header-emoji">🧹</span><h1>Quem aspira?</h1></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('turno')">Este fim de semana</button>
    <button class="tab" onclick="switchTab('aleatorio')">Sorteio</button>
  </div>
  <div class="content">
    <div class="panel active" id="panel-turno">
      <div id="pending-view">
        <div class="card">
          <p class="turn-label">A aspirar agora</p>
          <div class="mascot mascot--lg" id="main-mascot"></div>
          <p class="person-name" id="main-name"></p>
          <span class="badge badge-pending"><i class="ti ti-clock"></i> Por fazer</span>
        </div>
        <button class="btn-primary" onclick="markDone()">
          <i class="ti ti-check"></i> Marcar como feito
        </button>
        <div class="next-info">
          <span class="next-info-left">Na próxima semana</span>
          <div class="next-info-right">
            <div class="avatar-sm" id="next-avatar"></div>
            <span id="next-name"></span>
          </div>
        </div>
      </div>
      <div id="done-view" style="display:none;">
        <div class="card">
          <div class="done-icon"><i class="ti ti-check"></i></div>
          <p class="done-title" id="done-name"></p>
          <p class="done-sub">Quarto aspirado esta semana ✓</p>
        </div>
        <div class="next-info">
          <span class="next-info-left">Na próxima semana</span>
          <div class="next-info-right">
            <div class="avatar-sm" id="next-avatar2"></div>
            <span id="next-name2"></span>
          </div>
        </div>
      </div>
    </div>
    <div class="panel" id="panel-aleatorio">
      <div class="card">
        <p class="turn-label">Sortear quem começa</p>
        <p class="random-sub">Faz reset e escolhe aleatoriamente quem aspira este fim de semana.</p>
        <div class="countdown-area" id="countdown-area">
          <p class="countdown-hint">Carrega no botão para sortear</p>
        </div>
        <button class="btn-primary" id="random-btn" onclick="startSortear()">
          <i class="ti ti-dice"></i> Sortear
        </button>
      </div>
    </div>
  </div>

  <div class="history-section">
    <div class="history-head">
      <h2>Histórico</h2>
      <button class="reset-link" onclick="resetHistory()"><i class="ti ti-trash"></i> Limpar</button>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>
<script>
  const STORAGE_KEY = 'quem-aspira-v1';
  const HISTORY_KEY = 'quem-aspira-historico-v1';
  const people = [
    { id: 'joao',   name: 'João',   initials: 'J', smBg: '#DCEBFF', smColor: '#0C447C' },
    { id: 'rafael', name: 'Rafael', initials: 'R', smBg: '#DAF6EB', smColor: '#176B4E' }
  ];

  function loadState() { try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e) {} return { currentIdx: 0, done: false }; }
  function saveState(s) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e) {} }
  function loadHistory() { try { const r = localStorage.getItem(HISTORY_KEY); if (r) return JSON.parse(r); } catch(e) {} return []; }
  function saveHistory(h) { try { localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); } catch(e) {} }

  let state = loadState();
  let history = loadHistory();
  const nextIdx = i => (i + 1) % 2;

  function buildMascot(person, mood, size, id) {
    return '<div class="mascot mascot--' + size + ' mascot-' + person.id + ' mood-' + mood + '"' + (id ? ' id="' + id + '"' : '') + '>' +
      '<div class="mascot-face">' +
        '<div class="mascot-sparkle sparkle-1">✨</div>' +
        '<div class="mascot-sparkle sparkle-2">✨</div>' +
        '<div class="mascot-blush blush-l"></div>' +
        '<div class="mascot-blush blush-r"></div>' +
        '<div class="mascot-eyes"><span class="eye"></span><span class="eye"></span></div>' +
        '<div class="mascot-mouth"></div>' +
      '</div>' +
    '</div>';
  }

  function formatDate(iso) {
    const d = new Date(iso);
    const dia = d.toLocaleDateString('pt-PT', { day: '2-digit', month: 'short' });
    const hora = d.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
    return dia + ', ' + hora;
  }

  function renderHistory() {
    const list = document.getElementById('history-list');
    if (!history.length) {
      list.innerHTML = '<div class="history-empty">Ainda não há registos.</div>';
      return;
    }
    list.innerHTML = history.slice().reverse().map(entry => {
      const p = people.find(pp => pp.id === entry.personId) || people[0];
      return '<div class="history-item">' +
        '<div class="avatar-sm" style="background:' + p.smBg + ';color:' + p.smColor + '">' + p.initials + '</div>' +
        '<div class="history-info"><div class="history-name">' + p.name + '</div><div class="history-date">' + formatDate(entry.date) + '</div></div>' +
        '<i class="ti ti-check history-check"></i>' +
        '</div>';
    }).join('');
  }

  function resetHistory() {
    if (confirm('Limpar todo o histórico de registos?')) {
      history = [];
      saveHistory(history);
      renderHistory();
    }
  }

  function renderTurno() {
    const cur = people[state.currentIdx], nxt = people[nextIdx(state.currentIdx)];
    document.getElementById('main-mascot').outerHTML = buildMascot(cur, state.done ? 'happy' : 'pending', 'lg', 'main-mascot');
    document.getElementById('main-name').textContent = cur.name;
    if (state.done) {
      document.getElementById('pending-view').style.display = 'none';
      document.getElementById('done-view').style.display = 'block';
      document.getElementById('done-name').textContent = cur.name + ' aspirou!';
      const na2 = document.getElementById('next-avatar2');
      na2.style.background = nxt.smBg; na2.style.color = nxt.smColor; na2.textContent = nxt.initials;
      document.getElementById('next-name2').textContent = nxt.name;
    } else {
      document.getElementById('pending-view').style.display = 'block';
      document.getElementById('done-view').style.display = 'none';
      const na = document.getElementById('next-avatar');
      na.style.background = nxt.smBg; na.style.color = nxt.smColor; na.textContent = nxt.initials;
      document.getElementById('next-name').textContent = nxt.name;
    }
  }

  function fireConfetti() {
    const icon = document.querySelector('#done-view .done-icon');
    if (!icon) return;
    const colors = ['#FF8A3D', '#FFD166', '#FF5E62', '#1FAF7F', '#2F80ED'];
    for (let i = 0; i < 18; i++) {
      const piece = document.createElement('span');
      piece.className = 'confetti-piece';
      const angle = (Math.PI * 2 * i) / 18 + Math.random() * 0.4;
      const dist = 65 + Math.random() * 45;
      piece.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      piece.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      piece.style.setProperty('--rot', (Math.random() * 360 - 180) + 'deg');
      piece.style.background = colors[i % colors.length];
      piece.style.animationDelay = (Math.random() * 0.08) + 's';
      icon.appendChild(piece);
      setTimeout(() => piece.remove(), 1200);
    }
  }

  function markDone() {
    state.done = true;
    saveState(state);
    history.push({ personId: people[state.currentIdx].id, date: new Date().toISOString() });
    saveHistory(history);
    renderTurno();
    renderHistory();
    fireConfetti();
    setTimeout(() => {
      state = { currentIdx: nextIdx(state.currentIdx), done: false };
      saveState(state);
      renderTurno();
    }, 3000);
  }

  function switchTab(t) {
    document.querySelectorAll('.tab').forEach((el, i) => {
      el.classList.toggle('active', (i === 0 && t === 'turno') || (i === 1 && t === 'aleatorio'));
    });
    document.getElementById('panel-turno').classList.toggle('active', t === 'turno');
    document.getElementById('panel-aleatorio').classList.toggle('active', t === 'aleatorio');
  }

  let sorting = false;
  function startSortear() {
    if (sorting) return;
    sorting = true;
    document.getElementById('random-btn').disabled = true;
    const area = document.getElementById('countdown-area');
    let count = 3;
    function tick() {
      if (count > 0) {
        area.innerHTML = '<div class="countdown-stack"><div class="mystery-mascot">?</div><span class="countdown-num">' + count + '</span></div>';
        count--; setTimeout(tick, 700);
      } else {
        const chosen = Math.floor(Math.random() * 2), p = people[chosen];
        state = { currentIdx: chosen, done: false }; saveState(state); renderTurno();
        area.innerHTML = '<div style="text-align:center">' + buildMascot(p, 'happy', 'xl') + '<p class="reveal-name ' + p.id + '">' + p.name + '</p></div>';
        setTimeout(() => { sorting = false; document.getElementById('random-btn').disabled = false; area.innerHTML = '<p class="countdown-hint">Carrega no botão para sortear</p>'; }, 2600);
      }
    }
    tick();
  }

  renderTurno();
  renderHistory();
</script>
</body>
</html>
