<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quem aspira?</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-512.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Quem aspira?" />
  <meta name="theme-color" content="#444441" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f4f2;
      --card: #ffffff;
      --border: rgba(0,0,0,0.1);
      --text: #1a1a18;
      --text-secondary: #6b6b68;
      --radius-lg: 12px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
    }
    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }
    .header { padding: 20px 16px 0; }
    .header-card {
      background: linear-gradient(135deg, #4d4a46, #38362f);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      text-align: center;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }
    .header-card h1 { font-size: 20px; font-weight: 500; color: #ffffff; }
    .tabs { display: flex; padding: 14px 16px 0; border-bottom: 0.5px solid var(--border); }
    .tab {
      flex: 1; padding: 10px 0; font-size: 14px; font-weight: 500;
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
    }
    .tab.active { color: var(--text); border-bottom-color: var(--text); }
    .content { padding: 20px 16px 4px; }
    .panel { display: none; } .panel.active { display: block; }
    .card {
      background: var(--card); border-radius: var(--radius-lg);
      border: 0.5px solid var(--border); padding: 24px;
      text-align: center; margin-bottom: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.05);
      transition: box-shadow 0.25s ease;
    }
    .turn-label {
      font-size: 11px; color: var(--text-secondary);
      letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 16px;
    }
    .avatar-big {
      width: 80px; height: 80px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 500; margin: 0 auto 16px;
    }
    .avatar-joao { background: #E6F1FB; color: #0C447C; }
    .avatar-rafael { background: #EAF3DE; color: #27500A; }
    .person-name { font-size: 26px; font-weight: 500; color: var(--text); margin-bottom: 10px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 500;
    }
    .badge-pending { background: #FAEEDA; color: #633806; }
    .btn-primary {
      width: 100%; padding: 14px; border-radius: var(--radius-lg); border: none;
      background: var(--text); color: #fff; font-size: 16px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 8px; transition: transform 0.15s ease, opacity 0.15s; margin-bottom: 12px;
    }
    .btn-primary:active { opacity: 0.85; transform: scale(0.96); }
    .btn-primary:disabled { opacity: 0.35; cursor: default; transform: none; }
    .next-info {
      background: var(--card); border-radius: var(--radius-lg);
      border: 0.5px solid var(--border); padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .next-info-left { font-size: 13px; color: var(--text-secondary); }
    .next-info-right { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; color: var(--text); }
    .avatar-sm {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 500; flex-shrink: 0;
    }
    .done-icon {
      width: 60px; height: 60px; border-radius: 50%;
      background: #EAF3DE; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px; font-size: 26px; color: #27500A;
      animation: doneBounce 0.7s cubic-bezier(.36,1.7,.4,1);
      position: relative;
    }
    @keyframes doneBounce {
      0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
      55%  { transform: scale(1.25) rotate(8deg); opacity: 1; }
      75%  { transform: scale(0.9) rotate(-4deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    .confetti-piece {
      position: absolute; top: 50%; left: 50%; width: 6px; height: 10px;
      border-radius: 2px; opacity: 0; pointer-events: none;
      animation: confettiBurst 0.9s ease-out forwards;
    }
    @keyframes confettiBurst {
      0%   { opacity: 1; transform: translate(-50%, -50%) rotate(0deg) translateY(0); }
      100% { opacity: 0; transform: translate(-50%, -50%) rotate(var(--rot)) translate(var(--dx), var(--dy)); }
    }
    .done-title { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
    .done-sub { font-size: 14px; color: var(--text-secondary); }
    .random-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 28px; }
    .countdown-area {
      min-height: 120px; display: flex; align-items: center;
      justify-content: center; margin-bottom: 28px;
    }
    .countdown-hint { font-size: 14px; color: var(--text-secondary); }
    .countdown-num {
      font-size: 76px; font-weight: 600; color: var(--text); line-height: 1;
      animation: countdownPop 0.7s cubic-bezier(.36,1.6,.4,1);
      display: inline-block;
    }
    @keyframes countdownPop {
      0%   { transform: scale(0.3) rotate(-8deg); opacity: 0; }
      55%  { transform: scale(1.25) rotate(4deg); opacity: 1; }
      75%  { transform: scale(0.92) rotate(-2deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    .reveal-name { font-size: 34px; font-weight: 500; animation: pop 0.5s ease; }
    .reveal-name.joao { color: #185FA5; }
    .reveal-name.rafael { color: #3B6D11; }
    .reveal-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      margin: 0 auto 16px; display: flex; align-items: center;
      justify-content: center; font-size: 28px; font-weight: 500;
      animation: revealBounce 0.6s cubic-bezier(.36,1.7,.4,1);
    }
    @keyframes revealBounce {
      0%   { transform: scale(0) rotate(0deg); opacity: 0; }
      60%  { transform: scale(1.2) rotate(8deg); opacity: 1; }
      80%  { transform: scale(0.92) rotate(-4deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    @keyframes pop { 0% { transform: scale(1.4); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    /* HISTORY */
    .history-section { padding: 4px 16px 28px; }
    .history-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding: 0 4px; }
    .history-head h2 { font-size: 13px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.04em; text-transform: uppercase; }
    .reset-link { background: none; border: none; font-size: 13px; font-weight: 500; color: #9b3a3a; cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 4px; }
    .reset-link:active { opacity: 0.6; }
    .history-list { background: var(--card); border-radius: var(--radius-lg); border: 0.5px solid var(--border); overflow: hidden; }
    .history-item { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-bottom: 0.5px solid var(--border); }
    .history-item:last-child { border-bottom: none; }
    .history-info { flex: 1; min-width: 0; }
    .history-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .history-date { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
    .history-check { color: #27500A; font-size: 16px; flex-shrink: 0; }
    .history-empty { padding: 28px 16px; text-align: center; font-size: 13px; color: var(--text-secondary); }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-card"><h1>Quem aspira?</h1></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('turno')">Este fim de semana</button>
    <button class="tab" onclick="switchTab('aleatorio')">Sorteio</button>
  </div>
  <div class="content">
    <div class="panel active" id="panel-turno">
      <div id="pending-view">
        <div class="card">
          <p class="turn-label">A aspirar agora</p>
          <div class="avatar-big" id="main-avatar"></div>
          <p class="person-name" id="main-name"></p>
          <span class="badge badge-pending"><i class="ti ti-clock"></i> Por fazer</span>
        </div>
        <button class="btn-primary" onclick="markDone()">
          <i class="ti ti-check"></i> Marcar como feito
        </button>
        <div class="next-info">
          <span class="next-info-left">Na próxima semana</span>
          <div class="next-info-right">
            <div class="avatar-sm" id="next-avatar"></div>
            <span id="next-name"></span>
          </div>
        </div>
      </div>
      <div id="done-view" style="display:none;">
        <div class="card">
          <div class="done-icon"><i class="ti ti-check"></i></div>
          <p class="done-title" id="done-name"></p>
          <p class="done-sub">Quarto aspirado esta semana ✓</p>
        </div>
        <div class="next-info">
          <span class="next-info-left">Na próxima semana</span>
          <div class="next-info-right">
            <div class="avatar-sm" id="next-avatar2"></div>
            <span id="next-name2"></span>
          </div>
        </div>
      </div>
    </div>
    <div class="panel" id="panel-aleatorio">
      <div class="card">
        <p class="turn-label">Sortear quem começa</p>
        <p class="random-sub">Faz reset e escolhe aleatoriamente quem aspira este fim de semana.</p>
        <div class="countdown-area" id="countdown-area">
          <p class="countdown-hint">Carrega no botão para sortear</p>
        </div>
        <button class="btn-primary" id="random-btn" onclick="startSortear()">
          <i class="ti ti-dice"></i> Sortear
        </button>
      </div>
    </div>
  </div>

  <div class="history-section">
    <div class="history-head">
      <h2>Histórico</h2>
      <button class="reset-link" onclick="resetHistory()"><i class="ti ti-trash"></i> Limpar</button>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>
<script>
  const STORAGE_KEY = 'quem-aspira-v1';
  const HISTORY_KEY = 'quem-aspira-historico-v1';
  const people = [
    { id: 'joao',   name: 'João',   initials: 'J', avatarClass: 'avatar-joao',   smBg: '#B5D4F4', smColor: '#0C447C' },
    { id: 'rafael', name: 'Rafael', initials: 'R', avatarClass: 'avatar-rafael', smBg: '#C0DD97', smColor: '#27500A' }
  ];

  function loadState() { try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e) {} return { currentIdx: 0, done: false }; }
  function saveState(s) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e) {} }
  function loadHistory() { try { const r = localStorage.getItem(HISTORY_KEY); if (r) return JSON.parse(r); } catch(e) {} return []; }
  function saveHistory(h) { try { localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); } catch(e) {} }

  let state = loadState();
  let history = loadHistory();
  const nextIdx = i => (i + 1) % 2;

  function formatDate(iso) {
    const d = new Date(iso);
    const dia = d.toLocaleDateString('pt-PT', { day: '2-digit', month: 'short' });
    const hora = d.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
    return dia + ', ' + hora;
  }

  function renderHistory() {
    const list = document.getElementById('history-list');
    if (!history.length) {
      list.innerHTML = '<div class="history-empty">Ainda não há registos.</div>';
      return;
    }
    list.innerHTML = history.slice().reverse().map(entry => {
      const p = people.find(pp => pp.id === entry.personId) || people[0];
      return '<div class="history-item">' +
        '<div class="avatar-sm" style="background:' + p.smBg + ';color:' + p.smColor + '">' + p.initials + '</div>' +
        '<div class="history-info"><div class="history-name">' + p.name + '</div><div class="history-date">' + formatDate(entry.date) + '</div></div>' +
        '<i class="ti ti-check history-check"></i>' +
        '</div>';
    }).join('');
  }

  function resetHistory() {
    if (confirm('Limpar todo o histórico de registos?')) {
      history = [];
      saveHistory(history);
      renderHistory();
    }
  }

  function renderTurno() {
    const cur = people[state.currentIdx], nxt = people[nextIdx(state.currentIdx)];
    document.getElementById('main-avatar').className = 'avatar-big ' + cur.avatarClass;
    document.getElementById('main-avatar').textContent = cur.initials;
    document.getElementById('main-name').textContent = cur.name;
    if (state.done) {
      document.getElementById('pending-view').style.display = 'none';
      document.getElementById('done-view').style.display = 'block';
      document.getElementById('done-name').textContent = cur.name + ' aspirou!';
      const na2 = document.getElementById('next-avatar2');
      na2.style.background = nxt.smBg; na2.style.color = nxt.smColor; na2.textContent = nxt.initials;
      document.getElementById('next-name2').textContent = nxt.name;
    } else {
      document.getElementById('pending-view').style.display = 'block';
      document.getElementById('done-view').style.display = 'none';
      const na = document.getElementById('next-avatar');
      na.style.background = nxt.smBg; na.style.color = nxt.smColor; na.textContent = nxt.initials;
      document.getElementById('next-name').textContent = nxt.name;
    }
  }

  function fireConfetti() {
    const icon = document.querySelector('#done-view .done-icon');
    if (!icon) return;
    const colors = ['#27500A', '#185FA5', '#FAB95B', '#9b3a3a', '#6b6b68'];
    for (let i = 0; i < 16; i++) {
      const piece = document.createElement('span');
      piece.className = 'confetti-piece';
      const angle = (Math.PI * 2 * i) / 16 + Math.random() * 0.4;
      const dist = 60 + Math.random() * 40;
      piece.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      piece.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      piece.style.setProperty('--rot', (Math.random() * 360 - 180) + 'deg');
      piece.style.background = colors[i % colors.length];
      piece.style.animationDelay = (Math.random() * 0.08) + 's';
      icon.appendChild(piece);
      setTimeout(() => piece.remove(), 1100);
    }
  }

  function markDone() {
    state.done = true;
    saveState(state);
    history.push({ personId: people[state.currentIdx].id, date: new Date().toISOString() });
    saveHistory(history);
    renderTurno();
    renderHistory();
    fireConfetti();
    setTimeout(() => {
      state = { currentIdx: nextIdx(state.currentIdx), done: false };
      saveState(state);
      renderTurno();
    }, 3000);
  }

  function switchTab(t) {
    document.querySelectorAll('.tab').forEach((el, i) => {
      el.classList.toggle('active', (i === 0 && t === 'turno') || (i === 1 && t === 'aleatorio'));
    });
    document.getElementById('panel-turno').classList.toggle('active', t === 'turno');
    document.getElementById('panel-aleatorio').classList.toggle('active', t === 'aleatorio');
  }

  let sorting = false;
  function startSortear() {
    if (sorting) return;
    sorting = true;
    document.getElementById('random-btn').disabled = true;
    const area = document.getElementById('countdown-area');
    let count = 3;
    function tick() {
      if (count > 0) { area.innerHTML = '<span class="countdown-num">' + count + '</span>'; count--; setTimeout(tick, 700); }
      else {
        const chosen = Math.floor(Math.random() * 2), p = people[chosen];
        state = { currentIdx: chosen, done: false }; saveState(state); renderTurno();
        area.innerHTML = '<div style="text-align:center"><div class="reveal-avatar ' + p.avatarClass + '">' + p.initials + '</div><p class="reveal-name ' + p.id + '">' + p.name + '</p></div>';
        setTimeout(() => { sorting = false; document.getElementById('random-btn').disabled = false; area.innerHTML = '<p class="countdown-hint">Carrega no botão para sortear</p>'; }, 2500);
      }
    }
    tick();
  }

  renderTurno();
  renderHistory();
</script>
</body>
</html>
